    background: linear-gradient(90deg, #3366ff, #1e90ff);

    height: 65px;

  /* Sidebar with Modern Animated Look */
  .sidebar {
    height: 100vh; width: 270px; position: fixed; top: 0; left: 0;
    background: linear-gradient(180deg, #4a90e2, #007bff);
    padding-top: 80px; box-shadow: 2px 0px 12px rgba(0,0,0,0.2);
    transition: all 0.3s ease; z-index: 999; font-family: 'Poppins', sans-serif; overflow-x: hidden;
  }
  .sidebar a {
    padding: 15px 30px; text-decoration: none; font-size: 16px; color: #ffffff; display: block;
    font-weight: 600; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; transition: all 0.3s ease; position: relative;
  }
  .sidebar a::before { content:""; position:absolute; top:0; left:-100%; width:100%; height:100%;

  @keyframes gradientFlow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

<script>
async function refreshIdentityUI() {
  try {
    const res = await fetch('/me');
    const me = await res.json();
    const greet = document.getElementById('user-greeting');
    const lreg = document.getElementById('link-register');
    const llog = document.getElementById('link-login');
    const lout = document.getElementById('link-logout');
    if (me.authenticated) {
      greet.textContent = `Hi, ${me.name || me.email}`;
      lreg.style.display = 'none'; llog.style.display = 'none'; lout.style.display = '';
    } else {
      greet.textContent = '';
      lreg.style.display = ''; llog.style.display = ''; lout.style.display = 'none';
    }
  } catch (_) {}
}
async function logout() {
  try { await fetch('/logout', { method:'POST' }); } catch (_) {}
  await refreshIdentityUI();
  location.href = '/';
}
refreshIdentityUI();
</script>
