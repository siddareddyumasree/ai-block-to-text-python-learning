{% include 'header.html' %}

<div class="container" style="max-width: 520px;">
  <h1 class="mb-4">Log in </h1>
  <div class="mb-3">
    <label class="form-label">Email</label>
    <input id="email" type="email" class="form-control" placeholder="Enter you email here..">
  </div>
  <div class="mb-3">
    <label class="form-label">Password</label>
    <input id="password" type="password" class="form-control" placeholder="Enter password here..">
  </div>
  <button class="btn btn-success w-100" onclick="submitLogin()">Log in</button>
  <div id="msg" class="mt-3 text-danger"></div>
  <p class="mt-3">New user? <a href="/register">Create an account</a></p>
</div>

<script>
async function submitLogin() {
  const body = {
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value
  };
  const res = await fetch('/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  const data = await res.json();
  if (!res.ok) {
    document.getElementById('msg').textContent = data.error || 'Login failed';
    return;
  }
  // go home after login
  window.location.href = '/';
}
</script>
